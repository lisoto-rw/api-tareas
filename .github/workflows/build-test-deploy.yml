name: Build Test Deploy

#al recibir push a la rama main
on:
  push:
    branches:
      - main

# y tenga permiso de lectura de contenido y escritura para los packages
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

#se van a realizar lo siguiente
jobs:
  #se hacen buils and test como primera etapa o instancia, sobre una imagen de ubuntu
  build-test:
    name: Build y test Node.js
    runs-on: ubuntu-latest
    
    steps:
      #descargara el codigo, ejecutandolo una serie de pasos predefinidos
      - name: Descargar código
        uses: actions/checkout@v4
      #va a configurar nodejs con otros pasos definidos y ejecuta npm
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      #va a instalar las dependencias que el proyecto necesita
      - name: Instalar dependencias
        run: npm ci
      #va a ejecutar los test
      - name: Ejecutar tests
        run: npm test

  #NUEVA ETAPA: Calcular la versión de forma automática
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: build-test
    outputs:
      new_version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias de producción
        run: npm ci

      - name: Ejecutar Semantic Release
        id: semrel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      # Guardamos la versión calculada para pasársela a Docker
      - name: Guardar versión generada
        id: get_version
        run: |
          # Si se generó una nueva versión, la guardamos, si no, por defecto usamos '1.0.0'
          if [ -f package.json ]; then
            VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=1.0.0" >> $GITHUB_OUTPUT
          fi
          
  #siguiente jobs, es construir un docker y subirlo al registro de contenedores. sobre una imagen de ubuntu y necesitar para poder empezar buid-test que finalice exitosamente
  docker-build-push:
    name: Build y publicación Docker
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      #toma el codigo construido y pasado por los test
      - name: Descargar código
        uses: actions/checkout@v4
      #lo publica dentro del registry usando una imagen de docker. sin uso de token porqe es repo publico, sino deberia ponerse el token donde dice token.lo va a publicar con un determinado password y usuario. 
      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      #lo ultimo es publicar dentro de lo que es el registro de contenedores la ultima imagen del docker y poder colocar un tag en vez de latest para una version especifica, utilizar versionado semantico de los numeros. si se lo solicita.
      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/api-tareas:${{ needs.release.outputs.new_version }}
            ghcr.io/${{ github.repository_owner }}/api-tareas:latest
            ghcr.io/${{ github.repository_owner }}/api-tareas:${{ github.sha }}
